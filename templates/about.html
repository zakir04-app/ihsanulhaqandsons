<!-- templates/about.html -->
{% extends "base.html" %}
{% block content %}
<div class="card shadow border-0 p-5 rounded-4 bg-white">
    <div class="row align-items-center">
        <div class="col-md-7">
            <h2 class="fw-bold text-success mb-3">About {{ site_title }}</h2>
            <p class="lead text-dark">{{ about_text or 'Welcome to Ihsan Ul Haq & Sons General Store.' }}</p>
        </div>
        <div class="col-md-5 text-center">
            <div class="p-4 bg-light rounded-3 border d-flex align-items-center justify-content-center" style="min-height: 250px;">
                {% if site_cover %}
                    <img src="{{ site_cover }}" class="img-fluid rounded shadow-sm" style="max-height: 220px; object-fit: cover;" alt="Store Cover">
                {% else %}
                    <i class="bi bi-building fs-1 text-success"></i>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
