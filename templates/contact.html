<!-- templates/contact.html -->
{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow border-0 p-5 rounded-4 bg-white">
            <h3 class="fw-bold text-success mb-4 text-center"><i class="bi bi-telephone-inbound"></i> Contact Information</h3>
            <div class="row mt-4">
                <div class="col-md-6 mb-3">
                    <div class="p-3 border rounded bg-light">
                        <h6 class="fw-bold text-muted mb-1"><i class="bi bi-envelope-at text-success"></i> Official Email</h6>
                        <p class="mb-0 text-dark fw-semibold">zakir.ullah0004@gmail.com</p>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <div class="p-3 border rounded bg-light">
                        <h6 class="fw-bold text-muted mb-1"><i class="bi bi-whatsapp text-success"></i> WhatsApp Control</h6>
                        <p class="mb-0 text-dark fw-semibold">+971 50 XXXXXXX</p>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <div class="p-3 border rounded bg-light">
                        <h6 class="fw-bold text-muted mb-1"><i class="bi bi-geo-alt text-success"></i> Store Address</h6>
                        <p class="mb-0 text-dark small">Al Rahaba Facility Base, Dubai, UAE / Pakistan.</p>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <div class="p-3 border rounded bg-light">
                        <h6 class="fw-bold text-muted mb-1"><i class="bi bi-clock text-success"></i> Operating Hours</h6>
                        <p class="mb-0 text-dark small">08:00 AM - 11:00 PM (Everyday)</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
