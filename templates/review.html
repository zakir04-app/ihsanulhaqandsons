{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0 rounded-4 p-4">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-success mb-1">Feedback & Rating</h3>
                    <p class="text-muted small">Order #{{ order.id }} — {{ order.full_name or order.username }}</p>
                </div>

                <form action="{{ url_for('customer.review_order', order_id=order.id) }}" method="POST">
                    <div class="mb-4 text-center">
                        <label class="form-label fw-bold d-block mb-2">Aapka Experience Kaisa Raha?</label>
                        <select name="rating" class="form-select form-select-lg w-50 mx-auto text-center fw-bold">
                            <option value="5" {% if pre_rating == 5 %}selected{% endif %}>⭐⭐⭐⭐⭐ (5/5 Excellent)</option>
                            <option value="4" {% if pre_rating == 4 %}selected{% endif %}>⭐⭐⭐⭐ (4/5 Very Good)</option>
                            <option value="3" {% if pre_rating == 3 %}selected{% endif %}>⭐⭐⭐ (3/5 Average)</option>
                            <option value="2" {% if pre_rating == 2 %}selected{% endif %}>⭐⭐ (2/5 Below Average)</option>
                            <option value="1" {% if pre_rating == 1 %}selected{% endif %}>⭐ (1/5 Poor)</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold small">Aapka Comment / Remarks (Optional)</label>
                        <textarea name="comment" class="form-control" rows="3" placeholder="Apni raye yahan likhein..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-success fw-bold w-100 py-2 rounded-pill shadow-sm">
                        Submit Feedback
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
