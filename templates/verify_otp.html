<!-- templates/verify_otp.html -->
{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-0 p-4 rounded-3 text-center">
            <h3 class="fw-bold text-success mb-3"><i class="bi bi-shield-check"></i> Email Verification</h3>
            <p class="text-muted small">Apke email par 6-digits ka OTP code send kiya gaya hai. Account active karne ke liye niche enter karein.</p>
            <form action="{{ url_for('auth.verify_otp') }}" method="POST" class="mt-4">
                <div class="mb-4">
                    <input type="text" name="otp" class="form-control form-control-lg text-center fw-bold letter-spacing-lg" placeholder="123456" maxlength="6" required style="letter-spacing: 0.5rem; font-size: 2rem;">
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold py-2">Verify & Activate Account</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
