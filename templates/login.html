<!-- templates/login.html -->
{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0 mt-4">
            <div class="card-body p-4">
                <h3 class="card-title fw-bold text-center text-success mb-4">Secure Login</h3>
                <form action="/auth/login" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address</label>
                        <input type="email" name="email" class="form-control" required placeholder="Apni registered email likhein">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" class="form-control" required placeholder="Apna password darj karein">
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 fw-bold mt-2">Login</button>
                </form>
                <div class="text-center mt-3">
                    <p class="mb-0 text-muted">Naya account banana hai? <a href="/auth/register" class="text-success fw-bold text-decoration-none">Sign Up karein</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
